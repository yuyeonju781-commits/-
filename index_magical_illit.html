<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유연주를 파헤치다 ✨</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Segoe UI',sans-serif;
background:#fff;
overflow-x:hidden;
}
.hero{
height:100vh;
position:relative;
overflow:hidden;
}
.hero::after{
content:'';
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(255,245,255,.8),rgba(255,255,255,.05));
}
.hero img{
width:100%;
height:100%;
object-fit:cover;
filter:saturate(1.1) brightness(.9);
}
.title{
position:absolute;
left:8%;
bottom:15%;
z-index:2;
color:white;
text-shadow:0 0 20px rgba(255,255,255,.8);
}
.title h1{
font-size:clamp(4rem,10vw,8rem);
}
.title p{
font-size:1.3rem;
}

.sparkle{
position:absolute;
color:white;
font-size:30px;
animation:float 4s infinite ease-in-out;
z-index:2;
text-shadow:0 0 15px white;
}
@keyframes float{
50%{transform:translateY(-20px) scale(1.2)}
}

.glass{
max-width:1200px;
margin:-80px auto 50px;
position:relative;
z-index:5;
background:rgba(255,255,255,.65);
backdrop-filter:blur(16px);
border-radius:35px;
padding:40px;
box-shadow:0 10px 40px rgba(180,160,255,.2);
}

h2{
color:#7a67d8;
margin-bottom:20px;
font-size:2.5rem;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:linear-gradient(135deg,#fff,#fff6fd,#eef4ff);
padding:25px;
border-radius:25px;
box-shadow:0 5px 20px rgba(150,150,255,.08);
}

.small{font-size:.8rem;color:#777;margin-top:10px}
</style>
</head>
<body>

<section class="hero">
<img src="d49d862e-ab88-4176-891a-1275a547883b.png">

<div class="sparkle" style="top:15%;left:15%">✦</div>
<div class="sparkle" style="top:25%;right:20%">✧</div>
<div class="sparkle" style="top:70%;left:10%">✦</div>
<div class="sparkle" style="top:60%;right:15%">✧</div>

<div class="title">
<h1>유연주를 파헤치다</h1>
<p>✨ Dreamy Magical Archive ✨</p>
</div>
</section>

<div class="glass">
<h2>MAGICAL ARCHIVE</h2>

<div class="grid">
<div class="card">
<h3>🌙 사회복지</h3>
<p>복지 정책과 사회문제를 기록합니다.</p>
</div>

<div class="card">
<h3>🌊 부산</h3>
<p>부산 지역 이슈와 소식을 모아봅니다.</p>
</div>

<div class="card">
<h3>🎓 부경대학교</h3>
<p>학교 뉴스와 정보를 정리합니다.</p>
</div>

<div class="card">
<h3>✨ 통계</h3>
<p>사회복지 데이터를 시각적으로 제공합니다.</p>
</div>
</div>
</div>

</body>
</html>
