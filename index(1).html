<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>누가 네 최애야! 아일릿!!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI,sans-serif;background:#fff;}
.hero{height:100vh;position:relative;overflow:hidden}
.hero img{width:100%;height:100%;object-fit:cover;filter:brightness(.88)}
.hero:after{
content:'';position:absolute;inset:0;
background:linear-gradient(to top,rgba(255,245,255,.9),rgba(255,255,255,.05));
}
.title{
position:absolute;left:8%;bottom:15%;z-index:2;color:white;
text-shadow:0 0 25px rgba(255,255,255,.9);
}
.title h1{font-size:clamp(3.5rem,9vw,8rem)}
.title p{font-size:1.3rem}
.sparkle{
position:absolute;color:white;font-size:32px;
text-shadow:0 0 15px white;
animation:float 4s infinite ease-in-out;
z-index:2;
}
@keyframes float{50%{transform:translateY(-20px) scale(1.2)}}
.glass{
max-width:1200px;margin:-80px auto 50px;
background:rgba(255,255,255,.7);
backdrop-filter:blur(16px);
border-radius:35px;padding:40px;
box-shadow:0 10px 40px rgba(180,160,255,.2);
}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:25px}
.card{
background:linear-gradient(135deg,#fff,#fff6fd,#eef4ff);
padding:25px;border-radius:25px;
}
h2{color:#7a67d8;margin-bottom:25px}
</style>
</head>
<body>

<section class="hero">
<img src="d49d862e-ab88-4176-891a-1275a547883b.png">

<div class="sparkle" style="top:15%;left:15%">✦</div>
<div class="sparkle" style="top:25%;right:20%">✧</div>
<div class="sparkle" style="top:70%;left:10%">✦</div>
<div class="sparkle" style="top:60%;right:15%">✧</div>

<div class="title">
<h1>&lt;누가 네 최애야! 아일릿!!&gt;</h1>
<p>✨ Magical ILLIT Fan Archive ✨</p>
</div>
</section>

<div class="glass">
<h2>ILLIT WORLD</h2>
<div class="grid">
<div class="card">🌙 윤아</div>
<div class="card">✨ 민주</div>
<div class="card">🩷 모카</div>
<div class="card">⭐ 원희</div>
<div class="card">🎀 이로하</div>
</div>
</div>

</body>
</html>
